<!DOCTYPE HTML>
<head>
    <script>
      function addTransaction() {
  let category = document.getElementById("category").value;
  let type = document.getElementById("type").value;
  let amount = parseFloat(document.getElementById("amount").value);

  if (category === "" || isNaN(amount)) {
    alert("Please enter valid details");
    return;
  }

  let transaction = {
    category: category,
    type: type,
    amount: amount
  };

  transactions.push(transaction);
  updateUI();
  updateChart();
  updateStats();  // ✅ new function

  document.getElementById("category").value = "";
  document.getElementById("amount").value = "";
}
    </script>
    <style>
        /* Stats Heads */
    .stats-container {
      margin-top: 1rem;
      position: relative;
    }

    #stats-frame {
      width: 100%;
      height: 612px;
      border: none;
      border-radius: 0.5rem;
      box-shadow: 0 0 0 1px rgba(0,0,0,.1);
    }

    @media (min-width: 704px) {
      #stats-frame {
        height: 292px;
      }
    }

    .resize-handle {
      position: absolute;
      inset-block: 0;
      left: 100%;
      display: none;
      align-items: center;
      padding-inline: 0.5rem;
      cursor: ew-resize;
    }

    @media (min-width: 640px) {
      .resize-handle {
        display: flex;
      }
    }

    .resize-bar {
      height: 2rem;
      width: 0.375rem;
      background: #9ca3af;
      border-radius: 9999px;
    }



        img { filter:
                      sepia(1) hue-rotate(190deg) opacity(.46) grayscale(.7) }
    </style>

    <title>Project Money Management</title>
</head>

<body>

    <div class="container">
  <h2>💰 Expense Tracker</h2>

<select id="category">
        <option value="">Select Category</option>
        <option value="Salary">Salary</option>
        <option value="Business">Business</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Rent">Rent</option>
        <option value="Bills">Bills</option>
        <option value="Fashion">Fashion</option>
    </select>

    <!-- Amount -->
    <input type="number" id="amount" placeholder="Enter Amount">


  <select id="type">
    <option value="income" >Income</option>
    <option value="expense">Expense</option>
  </select>

  <button onclick="addTransaction()">Add Transaction</button>

  <h3>Balance: ₹ <span id="balance">0</span></h3>
  <p class="income">Total Income: ₹ <span id="totalIncome">0</span></p>
  <p class="expense">Total Expense: ₹ <span id="totalExpense">0</span></p>

  <h3>Transactions</h3>
  <ul id="transactionList"></ul>

  <!-- Pie chart container -->
  <div id="piechart" style="width: 1000px; height: 400px;"></div>
</div>

    <!-- Stats BOdy -->
    <section class="stats-container">
    <iframe
      id="stats-frame"
      src="iframess.html"
      title="With brand icon preview"
      aria-label="With brand icon preview"
      role="document">
    </iframe>

    <div class="resize-handle">
      <div class="resize-bar"></div>
    </div>
  </section>
</body>
